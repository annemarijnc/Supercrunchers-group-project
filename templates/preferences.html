<!DOCTYPE html>
<html>
<head>
    <title>Preferences</title>
    <style>
        .slider-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .slider-row label {
            width: 110px;
            min-width: 110px;
            margin-right: 10px;
            text-align: right;
        }
        .slider-row input[type=range] {
            margin: 0 10px;
            width: 120px;
            min-width: 120px;
            max-width: 120px;
            flex: unset;
        }
        .slider-row output {
            width: 30px;
            display: inline-block;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>Preferences</h1>
    <p>Rate how important the following attributes are for your partner to have:</p>
    <form method="POST" id="preferencesForm" onsubmit="return validateSum()">
        <label for="attr1">Sincerity:</label>
        <input type="number" id="attr1" name="attr1" min="1" max="100" required><br><br>
        <label for="attr2">Intelligence:</label>
        <input type="number" id="attr2" name="attr2" min="1" max="100" required><br><br>
        <label for="attr3">Funny:</label>
        <input type="number" id="attr3" name="attr3" min="1" max="100" required><br><br>
        <label for="attr4">Ambition:</label>
        <input type="number" id="attr4" name="attr4" min="1" max="100" required><br><br>
        <label for="attr5">Shared Interests:</label>
        <input type="number" id="attr5" name="attr5" min="1" max="100" required><br><br>
        <span id="errorMsg" style="color:red;"></span><br>
        <p>Rate all these interests from: 1 (Not important) - 10 (Very important)</p><br>
        <label>1 (Not important)</label><br>
        <div class="slider-row"><label for="sports">Sports:</label>
        <input type="range" id="sports" name="sports" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="tvsports">Tvsports:</label>
        <input type="range" id="tvsports" name="tvsports" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="exercise">Exercise:</label>
        <input type="range" id="exercise" name="exercise" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="dining">Dining:</label>
        <input type="range" id="dining" name="dining" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="museums">Museums:</label>
        <input type="range" id="museums" name="museums" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="art">Art:</label>
        <input type="range" id="art" name="art" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="hiking">Hiking:</label>
        <input type="range" id="hiking" name="hiking" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="gaming">Gaming:</label>
        <input type="range" id="gaming" name="gaming" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="clubbing">Clubbing:</label>
        <input type="range" id="clubbing" name="clubbing" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="reading">Reading:</label>
        <input type="range" id="reading" name="reading" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="tv">Tv:</label>
        <input type="range" id="tv" name="tv" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="theater">Theater:</label>
        <input type="range" id="theater" name="theater" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="movies">Movies:</label>
        <input type="range" id="movies" name="movies" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="concerts">Concerts:</label>
        <input type="range" id="concerts" name="concerts" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="music">Music:</label>
        <input type="range" id="music" name="music" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="shopping">Shopping:</label>
        <input type="range" id="shopping" name="shopping" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <div class="slider-row"><label for="yoga">Yoga:</label>
        <input type="range" id="yoga" name="yoga" min="1" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output></div>
        <input type="submit" value="Submit">
    </form>
    <script>
    function validateSum() {
        const vals = [
            parseInt(document.getElementById('attr1').value) || 0,
            parseInt(document.getElementById('attr2').value) || 0,
            parseInt(document.getElementById('attr3').value) || 0,
            parseInt(document.getElementById('attr4').value) || 0,
            parseInt(document.getElementById('attr5').value) || 0
        ];
        const sum = vals.reduce((a, b) => a + b, 0);
        if (sum !== 100) {
            document.getElementById('errorMsg').textContent = 'The total must add up to 100. None of the values can be 0.';
            return false;
        }
        document.getElementById('errorMsg').textContent = '';
        return true;
    }
    </script>
</body>
</html>
