<!DOCTYPE html>
<html>
<head><title>Model Explanation</title></head>
<body>
    <h1>Model Explanation</h1>
    <form method="POST">
        <p>Agreement with Explanation: To what extent does the model reflect your own reasoning?</p>
        <label>0 (Not at all reflective)</label>
        <input type="range" name="agreement" min="0" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output>
        <label>10 (Completely reflective)</label>

        <p>Trust in Explanation: How much do you trust the model?</p>
        <label>0 (Did not trust at all)</label>
        <input type="range" name="trust" min="0" max="10" step="1" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output>
        <label>10 (Trusted completely)</label>
        <br><br>
        <input type="submit" value="Next">
    </form>
</body>
</html>
